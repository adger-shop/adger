<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adger - الفئات</title>
    <link rel="icon" href="https://i.postimg.cc/8CKxL3B8/logo.jpg" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-height: 66px;
            --sidebar-width: 100px;
            --primary-color: #8c00ff;
            --secondary-color: #00e0ff;
            --content-bg: #f4f5f7;
            --text-color: #333;
            --text-light-color: #666;
            --border-color: #eef0f3;
        }

        /* --- Global & Animations --- */
        html {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        
        body, div, main, h2, h3, img, span, p {
            box-sizing: inherit;
        }
        
        .menu-item {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background-color: var(--content-bg);
            overflow: hidden;
        }
        
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        /* --- Page Loader --- */
        .page-loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - var(--header-height) - 50px);
            width: 100%;
        }
        .dots-loader {
            display: flex; position: relative; width: 60px; justify-content: center; align-items: center;
        }
        .dots-loader .dot {
            width: 20px; height: 20px; border-radius: 50%; position: absolute;
        }
        .dots-loader .dot1 {
            background-color: var(--primary-color);
            animation: tiktok-dots-loader 1.2s cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
        }
        .dots-loader .dot2 {
            background-color: var(--secondary-color);
            animation: tiktok-dots-loader 1.2s cubic-bezier(0.785, 0.135, 0.15, 0.86) infinite;
            animation-delay: -0.6s;
        }
        @keyframes tiktok-dots-loader {
            0%, 100% { transform: translateX(-15px) scale(0.8); }
            50% { transform: translateX(15px) scale(1.2); }
        }

        /* --- Sidebar --- */
        .sidebar {
            width: var(--sidebar-width);
            height: calc(100vh - var(--header-height));
            background-color: #2c2c2c;
            position: fixed;
            top: var(--header-height);
            right: 0;
            overflow-y: auto;
            padding-top: 15px;
            border-left: 1px solid #444;
        }
        .menu-item {
            padding: 15px 5px; cursor: pointer; font-size: 14px;
            color: white; text-align: center; user-select: none;
            border-right: 4px solid transparent;
        }
        .menu-item:hover { background-color: rgba(255, 255, 255, 0.1); }
        .menu-item.active {
            font-weight: 700;
            border-right: 4px solid var(--primary-color);
            background-color: rgba(255, 255, 255, 0.1);
        }
        .menu-item-placeholder {
            height: 30px; width: 70px; margin: 0 auto 20px;
            border-radius: 6px; position: relative; overflow: hidden;
            background-color: #4a4a4a;
        }
        .menu-item-placeholder::after {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 1.5s infinite;
        }

        /* --- Content Area --- */
        .content-area {
            position: fixed;
            top: var(--header-height);
            right: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            height: calc(100vh - var(--header-height));
            padding: 20px; 
            overflow-y: auto;
            background-color: #f0f0f0; 
        }
        .content { display: none; }
        
        .category-header {
            font-size: 19px;
            font-family: Cairo, sans-serif;
            color: #333;
            text-align: right;
            margin: -8px 20px 20px 20px; 
        }
        .header-main-text, .header-category-name {
            display: none;
        }

        /* --- Product Grid & Card Styling --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            justify-content: start;
            margin-bottom: 10px;
        }
        
        .product-card {
            text-align: center;
            cursor: pointer;
        }
        .image-wrapper {
            position: relative; width: 100%; aspect-ratio: 1 / 1;
            border-radius: 50%; margin-bottom: 10px; overflow: hidden;
            background-color: #ffffff;
            transition: transform 0.3s ease;
        }
        .image-wrapper.more-card-wrapper {
            background-color: transparent;
        }
        .product-card img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; 
            transition: opacity 0.5s ease;
        }
        .product-card:hover .image-wrapper {
            transform: scale(1.05); 
        }
        .product-card img.loaded { opacity: 1; }
        
        .product-name {
            display: block; width: 100%;
            margin: 0 0 5px 0;
            font-size: 16px;
            color: var(--text-color); font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .product-price {
            margin: 0;
            font-size: 11px;
            color: #000;
            font-family: Cairo, sans-serif;
        }

        /* --- Scroll Up Indicator --- */
        .scroll-indicator {
            text-align: center;
            padding-top: 25px; /* تم فصل الحشوة العلوية */
            padding-bottom: 25px; /* تم فصل الحشوة السفلية */
            color: #888;
        }
        .scroll-indicator .indicator-line {
            border: 0;
            height: 1px;
            background-color: #e0e0e0;
            margin-bottom: 25px;
            margin-right: -20px; 
            margin-left: -20px; 
        }
        .scroll-indicator .arrow-circle {
            width: 40px;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }
        .scroll-indicator .arrow-circle svg {
            width: 20px;
            height: 20px;
            stroke: #aaa;
        }
        .scroll-indicator .indicator-text {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
        }

        /* --- Responsive Design --- */
        @media (max-width: 769px) {
            .category-header { font-size: 16px; margin-right: -4px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .product-name, .product-price { font-size: 14px; }

            /* **تعديل جديد وحاسم**: تقليل المسافة أسفل شبكة المنتجات في الهواتف */
            .products-grid {
                margin-bottom: 10px;
            }

            .scroll-indicator {
                /* **تعديل جديد وحاسم**: تقليل المسافة العلوية بشكل أكبر */
                padding-top: 5px;
                padding-bottom: 20px;
            }

            .scroll-indicator .indicator-line {
                margin-bottom: 20px;
            }
            .scroll-indicator .arrow-circle {
                width: 35px;
                height: 35px;
                margin-bottom: 10px;
            }
            .scroll-indicator .indicator-text {
                font-size: 12px;
            }
        }
        @media (max-width: 499px) {
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .product-name, .product-price { font-size: 12px; }
        }
        @media (min-width: 1024px) {
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .product-name, .product-price { font-size: 18px; }
        }
        @media (min-width: 1200px) {
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .product-name, .product-price { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="menu-item-placeholder"></div><div class="menu-item-placeholder"></div><div class="menu-item-placeholder"></div><div class="menu-item-placeholder"></div><div class="menu-item-placeholder"></div>
    </div>

    <main id="main-content" class="content-area">
        <div id="page-loader" class="page-loader-container">
            <div class="dots-loader"><span class="dot dot1"></span><span class="dot dot2"></span></div>
        </div>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2.38.5";
        const supabase = createClient(
            'https://aagsmtkuygnlgeyboarg.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhZ3NtdGt1eWdubGdleWJvYXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ3NDQzNDEsImV4cCI6MjA3MDMyMDM0MX0.rgMrAM3vURYo7bFvy9okiogXEh9wyFwp9Z0yAxBE9SI'
        );
        
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const pageLoader = document.getElementById('page-loader');
        let allProducts = [];
        let contentPanes = {};

        function searchCategory(categoryName) {
            window.location.href = `adger.search.html?search=${encodeURIComponent(categoryName)}`;
        }

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const img = card.querySelector('img');
                    if(img && img.dataset.src) {
                        img.src = img.dataset.src;
                        img.onload = () => img.classList.add('loaded');
                    }
                    observer.unobserve(card);
                }
            });
        }, { rootMargin: '0px 0px 200px 0px' });

        async function initializeApp() {
            document.body.style.overflow = 'hidden';
            try {
                const { data, error } = await supabase.from('products').select('id, name, category, images, price');
                if (error) throw error;
                allProducts = data.map(p => ({
                    ...p,
                    category: p.category ? p.category.trim() : 'عام'
                })).filter(p => p.images && Array.isArray(p.images) && p.images.length > 0);

                const categories = [...new Set(allProducts.map(p => p.category))].sort();
                buildUI(categories);
                pageLoader.style.display = 'none';
                if (categories.length > 0) {
                    showCategory(categories[0]);
                }
            } catch (err) {
                console.error('Error fetching data:', err);
                pageLoader.style.display = 'none';
                mainContent.innerHTML += `<p style="text-align: center; color: red;">فشل تحميل البيانات. يرجى تحديث الصفحة والمحاولة مرة أخرى.</p>`;
            } finally {
                document.body.style.overflow = 'auto';
            }
        }

        function buildUI(categories) {
            sidebar.innerHTML = '';
            categories.forEach(cat => {
                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';
                menuItem.textContent = cat;
                menuItem.dataset.category = cat;
                menuItem.onclick = () => showCategory(cat);
                sidebar.appendChild(menuItem);
            });
            categories.forEach(cat => {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'content';
                contentDiv.id = `content-${cat}`;
                contentDiv.innerHTML = `
                    <div class="category-header">
                        <span class="header-main-text">التسوق حسب الفئة:</span>
                        <span class="header-category-name">${cat}</span>
                        التسوق حسب الفئة 
                    </div>
                    <div class="products-grid"></div>
                `;
                mainContent.appendChild(contentDiv);
                contentPanes[cat] = contentDiv;
            });
        }
        
        function createAndAppendScrollIndicator(container, categoryName) {
            const indicator = document.createElement('div');
            indicator.className = 'scroll-indicator';
            indicator.innerHTML = `
                <hr class="indicator-line">
                <div class="arrow-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </div>
                <p class="indicator-text">اسحب لأعلى لمتابعة تصفح ${categoryName}</p>
            `;
            container.appendChild(indicator);
        }

        function showCategory(category) {
            Object.values(contentPanes).forEach(pane => pane.style.display = 'none');
            document.querySelectorAll('.scroll-indicator').forEach(el => el.remove());

            sidebar.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const activeMenuItem = sidebar.querySelector(`.menu-item[data-category="${category}"]`);
            activeMenuItem.classList.add('active');
            
            const activeContent = contentPanes[category];
            activeContent.style.display = 'block';
            
            const grid = activeContent.querySelector('.products-grid');
            if (grid.children.length === 0) {
                populateGridWithProducts(grid, category);
            }

            setTimeout(() => {
                if (activeContent.scrollHeight > mainContent.clientHeight) {
                    createAndAppendScrollIndicator(activeContent, category);
                }
            }, 100);
        }
        
        function populateGridWithProducts(grid, category) {
            grid.innerHTML = ''; 
            const productsToDisplay = allProducts.filter(p => p.category === category);
            
            productsToDisplay.forEach(product => {
                const card = createProductCard(product);
                grid.appendChild(card);
                observer.observe(card);
            });
            
            const moreCard = document.createElement('div');
            moreCard.className = 'product-card';
            moreCard.onclick = () => searchCategory(category);
            moreCard.innerHTML = `
                <div class="image-wrapper more-card-wrapper">
                    <img src="https://i.postimg.cc/sDzLCyrs/xrquxf-removebg-preview.png" alt="المزيد" class="loaded" style="object-fit: cover;">
                </div>
                <h2 class="product-name" style="font-weight: 700; display:none;">المزيد</h2>
                <h3 class="product-price">المزيد</h3>
            `;
            grid.appendChild(moreCard);
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => window.location.href = `prod.html?id=${product.id}`;
            const productName = product.name || 'منتج غير مسمى';
            const productPrice = (product.price || 0).toFixed(2);
            card.innerHTML = `
                <div class="image-wrapper">
                    <img data-src="${product.images[0]}" alt="${productName}">
                </div>
                <h2 class="product-name" title="${productName}">${productName}</h2>
                <h3 class="product-price">${productPrice} جنيه</h3>
            `;
            return card;
        }

        initializeApp();
    </script>
</body>
</html>

                .adger-container svg {
                    margin-left: 15px; /* Space between text and arrow */
                    margin-right: 5px; /* Adjust for better visibility */

    <script>
        // استرجاع بيانات المستخدم من localStorage
        const username = localStorage.getItem('username');
        
        // عرض "أهلاً" مع اسم المستخدم أو نص بديل
        const welcomeMessage = document.getElementById('welcomeMessage');
        const usernameDisplay = document.getElementById('usernameDisplay');
        
        if (username) {
            usernameDisplay.textContent = truncateUsername(username);
            window.addEventListener('resize', () => {
                usernameDisplay.textContent = truncateUsername(username);
            });
        } else {
            welcomeMessage.innerHTML = 'أهلاً، <span style="color: black; cursor: pointer;" onclick="window.location.href=\'account.html\'">سجل دخولك</span>';
        }
        
        // دالة للتحقق من النصوص العربية
        function isArabic(text) {
            return /[\u0600-\u06FF]/.test(text);
        }
        
        // دالة لتقصير اسم المستخدم
        function truncateUsername(name) {
            const maxLength = isArabic(name) ? 12 : 7;
            if (window.innerWidth < 966 && name.length > maxLength) {
                if (isArabic(name)) {
                    return name.substring(0, maxLength) + '..';
                } else {
                    return '..' + name.substring(0, maxLength);
                }
            }
            return name;
        }
        
        // دالة لإظهار أو إخفاء القائمة الجانبية
        function toggleMenu() {
            const menuPopup = document.getElementById('menuPopup');
            if (menuPopup.classList.contains('active')) {
                menuPopup.classList.add('closing');
                setTimeout(() => {
                    menuPopup.classList.remove('active', 'closing');
                    menuPopup.style.display = 'none';
                }, 300); // يتناسب مع مدة animation
            } else {
                menuPopup.style.display = 'block';
                menuPopup.classList.add('active');
            }
        }
        
        // إغلاق النافذة بالنقر على الشاشة خارج النافذة
        document.body.addEventListener('click', function(event) {
            const menuPopup = document.getElementById('menuPopup');
            if (menuPopup.classList.contains('active') && 
                !menuPopup.contains(event.target) && 
                !event.target.closest('.menu-icon')) {
                toggleMenu();
            }
        });
        
        // إغلاق النافذة أثناء التمرير من اليمين إلى اليسار
        let touchStartX = 0;
        let touchCurrentX = 0;
        let isSwiping = false;
        
        document.addEventListener('touchstart', function(event) {
            const menuPopup = document.getElementById('menuPopup');
            if (menuPopup.classList.contains('active')) {
                touchStartX = event.touches[0].screenX;
                isSwiping = true;
            }
        });
        
        document.addEventListener('touchmove', function(event) {
            if (isSwiping) {
                touchCurrentX = event.touches[0].screenX;
                const swipeDistance = touchStartX - touchCurrentX;
                if (swipeDistance > 50) {
                    toggleMenu();
                    isSwiping = false;
                }
            }
        });
        
        document.addEventListener('touchend', function() {
            isSwiping = false;
        });
        
        // دالة لتحديث عدد العناصر في العربة
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartCountElement = document.querySelector('.cart-count');
            if (cartCountElement) {
                cartCountElement.textContent = cart.length;
            }
        }
        
        // دالة لإضافة المنتج إلى العربة
        function addToCart(button) {
            const productContainer = button.closest('.image-container');
            const product = {
                id: productContainer.querySelector('img').src, // استخدام الصورة كمعرف فريد
                image: productContainer.querySelector('img').src,
                name: productContainer.querySelector('h1').textContent,
                sold: productContainer.querySelector('h2').textContent,
                price: productContainer.querySelector('.number').textContent,
                discount: productContainer.querySelector('h3').textContent,
                link: productContainer.querySelector('a').href // حفظ رابط الصفحة المخصصة
            };
        
            // استرجاع العربة الحالية من localStorage
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            // التحقق مما إذا كان المنتج موجودًا بالفعل في العربة
            const existingProduct = cart.find(item => item.id === product.id);
            if (!existingProduct) {
                cart.push(product); // إضافة المنتج الجديد
                localStorage.setItem('cart', JSON.stringify(cart)); // تحديث العربة في localStorage
                updateCartCount();
            }
        }
        
        // التنقل إلى صفحة العربة
        function navigateToCart() {
            window.location.href = 'cart.html';
        }
        
        // ربط حدث النقر على أيقونة العربة
        document.querySelector('.cart-icon')?.addEventListener('click', navigateToCart);
        
        // تحديث عدد المنتجات عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
        });
    
        // الاستماع إلى تغييرات localStorage من صفحات أخرى
        window.addEventListener('storage', function(event) {
            if (event.key === 'cart') {
                updateCartCount();
            }
        });
    
        // تحديث العدد عند تحميل الصفحة لأول مرة
        updateCartCount();
    </script>
